<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>SVG Canlı Önizleme</title>
  <style>
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      background: #f0f0f0;
    }
    #svg-container {
      width: 80%;
      height: 80%;
      border: 1px solid #ccc;
    }
    svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="svg-container">SVG Yükleniyor...</div>

  <script>
    const svgUrl = 'https://raw.githubusercontent.com/tafbilgiislem/ypm/main/slayt.svg'; // Buraya Github'daki SVG dosyanın ham linkini koy

    async function loadSVG() {
      try {
        const response = await fetch(svgUrl, { cache: "no-store" });
        if (!response.ok) throw new Error('SVG yüklenemedi!');
        const svgText = await response.text();
        document.getElementById('svg-container').innerHTML = svgText;
      } catch (e) {
        document.getElementById('svg-container').textContent = 'SVG yüklenirken hata oluştu: ' + e;
      }
    }

    // İlk yükleme
    loadSVG();

    // 2 saniyede bir SVG'yi kontrol edip güncelle
    setInterval(loadSVG, 2000);
  </script>
</body>
</html>
