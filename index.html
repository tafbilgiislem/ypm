<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slayt</title>

<style>

html,body{
margin:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
}

.container{
position:relative;
width:100vw;
height:100vh;
}

.frame{
position:absolute;
width:100%;
height:100%;
border:none;
}

</style>

<script>

let aktif = 1;

function reloadSVG(){

let yeni = aktif === 1 ? 2 : 1;
let aktifFrame = document.getElementById("frame"+aktif);
let yeniFrame = document.getElementById("frame"+yeni);

yeniFrame.data = "slayt.svg?t="+Date.now();

yeniFrame.onload = function(){

aktifFrame.style.opacity="0";
yeniFrame.style.opacity="1";

aktif = yeni;

}

}

setInterval(reloadSVG,3000);

</script>

</head>

<body>

<div class="container">

<object id="frame1"
class="frame"
type="image/svg+xml"
data="slayt.svg"
style="opacity:1">
</object>

<object id="frame2"
class="frame"
type="image/svg+xml"
data=""
style="opacity:0">
</object>

</div>

</body>

</html>
