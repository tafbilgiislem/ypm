<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Real-Time Flicker-Free SVG Slider</title>
<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}
#slider{
  position:relative;
  width:100vw;
  height:100vh;
  perspective:1800px;
  transform-style:preserve-3d;
}
.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transform-style:preserve-3d;
}
.slide.active{opacity:1;}

/* Zoom efekti */
.zoom{
  transform:scale(1.3);
  opacity:0;
  filter:blur(8px);
}
.zoom.active{
  transform:scale(1);
  opacity:1;
  filter:blur(0);
  transition:
    transform 2.4s cubic-bezier(0.16,1,0.3,1),
    opacity 1.8s ease-out,
    filter 2.2s ease-out;
}

/* Cube efekti */
.cube{
  transform:rotateY(85deg) translateZ(500px) scale(.6);
  opacity:0;
  filter:brightness(1.6) contrast(1.2) blur(10px);
}
.cube.active{
  transform:rotateY(0deg) translateZ(0px) scale(1);
  opacity:1;
  filter:brightness(1) contrast(1) blur(0);
  transition:
    transform 2s cubic-bezier(0.19,1,0.22,1),
    opacity 1.5s ease,
    filter 1.8s ease;
}
</style>
</head>
<body>
<div id="slider">
  <object id="frame1" class="slide active"></object>
  <object id="frame2" class="slide"></object>
</div>

<script>
// --- Slaytlar ---
const slides = [
  {file:"slayt.svg", effect:"zoom", duration:10000},
  {file:"info.svg", effect:"cube", duration:6000},
  {file:"slayt.svg", effect:"zoom", duration:10000},
  {file:"info.svg", effect:"cube", duration:8000}
];

let aktif = 1; // frame1 aktif
let index = 0;

// --- SVG yükleme (cache bypass) ---
function loadSVG(slide, frame){
  frame.className = "slide " + slide.effect;
  frame.data = slide.file + "?t=" + Date.now();
}

// --- Slayt geçişi (double-buffer) ---
function showNextSlide(){
  let yeni = aktif===1 ? 2 : 1;
  let aktifFrame = document.getElementById("frame"+aktif);
  let yeniFrame = document.getElementById("frame"+yeni);
  let slide = slides[index];

  loadSVG(slide, yeniFrame);

  yeniFrame.onload = function(){
    aktifFrame.classList.remove("active");
    yeniFrame.classList.add("active");
    aktif = yeni;

    index = (index+1) % slides.length;
    setTimeout(showNextSlide, slide.duration);
  }
}

// --- Başlat ---
window.onload = function(){
  document.getElementById("frame1").data = slides[0].file + "?t=" + Date.now();
  index = 1;
  setTimeout(showNextSlide, slides[0].duration);
}

// --- Gerçek zamanlı SVG güncelleme ---
const fsCheckInterval = 1000; // 1 saniye
setInterval(()=>{
  const aktifFrame = document.getElementById("frame"+aktif);
  const currentSlide = slides[index===0 ? slides.length-1 : index-1];

  // Aktif SVG dosyası değişmişse yeniden yükle
  fetch(currentSlide.file, {cache:"no-store"}).then(resp=>{
    if(resp.ok){
      // Yeniden yükle
      aktifFrame.data = currentSlide.file + "?t=" + Date.now();
    }
  });
}, fsCheckInterval);
</script>
</body>
</html>
