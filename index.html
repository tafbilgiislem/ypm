<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SVG Live Remote Refresh</title>
<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
}
#svgFrame {
  width:100vw;
  height:100vh;
  border:none;
}
</style>
</head>
<body>

<object id="svgFrame" data="dosya.svg" type="image/svg+xml"></object>

<script>
const svgFile = 'slayt.svg'; // SVG dosyan aynı depoda

function reloadSVG() {
  const frame = document.getElementById('svgFrame');
  // cacheBuster ekleyerek her seferinde güncel SVG çek
  frame.data = svgFile + '?v=' + Date.now();
}

// Örnek: 2 saniyede bir kontrol et
setInterval(reloadSVG, 2000);
</script>

</body>
</html>
