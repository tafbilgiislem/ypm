<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SVG Live Fullscreen</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
}

#svgFrame{
  width:100vw;
  height:100vh;
  border:none;
}
</style>

</head>

<body>

<object id="svgFrame" data="dosya.svg" type="image/svg+xml"></object>

<script>

const svgFile = "slayt.svg";

function reloadSVG(){
  const frame = document.getElementById("svgFrame");
  
  // cache kırıcı
  frame.data = svgFile + "?v=" + Date.now();
}

// ilk yükleme
reloadSVG();

// 1 saniyede bir güncelle
setInterval(reloadSVG,1000);

</script>

</body>
</html>
