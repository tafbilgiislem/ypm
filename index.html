<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Animasyon Senkron Slider</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
display:flex;
justify-content:center;
align-items:center;
}

#slider{
position:relative;
width:100vw;
height:100vh;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:all 1s ease-in-out;
}

.slide.active{
opacity:1;
}

/* Efektler */

.zoom{
transform:scale(0.5);
opacity:0;
}

.zoom.active{
transform:scale(1);
opacity:1;
transition:all 1s ease-in-out;
}

.cube{
transform:rotateY(180deg) scale(.5);
opacity:0;
}

.cube.active{
transform:rotateY(0) scale(1);
opacity:1;
transition:1.5s;
}

</style>

</head>

<body>

<div id="slider"></div>

<script>

const svgFiles = [

{file:"slayt.svg",effect:"zoom",duration:10000},

{file:"info.svg",effect:"cube",duration:6000}

];

const slider=document.getElementById("slider");

let slides=[];

let currentIndex=0;


// SVG preload oluştur
svgFiles.forEach((s)=>{

const obj=document.createElement("object");

obj.type="image/svg+xml";

obj.classList.add("slide",s.effect);

obj.style.width="100%";

obj.style.height="100%";

obj.dataset.file=s.file;

obj.dataset.duration=s.duration;

slider.appendChild(obj);

slides.push(obj);

});


// SVG yükleme fonksiyonu (cache bypass)
function loadSVG(slide){

let file=slide.dataset.file;

slide.data=file+"?t="+Date.now();

}


// Slayt göster
function showSlide(index){

slides.forEach(slide=>slide.classList.remove("active"));

const currentSlide=slides[index];

loadSVG(currentSlide);

currentSlide.classList.add("active");

const duration=parseInt(currentSlide.dataset.duration);

currentIndex=index;

let next=currentIndex+1;

if(next>=slides.length) next=0;


// Sonraki slayt
setTimeout(()=>{

showSlide(next);

},duration);

}


// Otomatik SVG update kontrol (dosya değişirse)
setInterval(()=>{

slides.forEach(slide=>{

if(slide.classList.contains("active")){

loadSVG(slide);

}

});

},3000);


// Başlat
showSlide(0);

</script>

</body>

</html>
