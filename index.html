<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SVG Live Clock</title>
<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
}
#svgFrame {
  width:100vw;
  height:100vh;
  border:none;
}
</style>
</head>
<body>

<iframe id="svgFrame" src="slayt.svg" frameborder="0"></iframe>

<script>
const svgFile = 'dosya.svg';

function reloadSVG() {
  const frame = document.getElementById('svgFrame');
  // cacheBuster ekleyerek tarayıcı önbelleğe bakmaz
  frame.src = svgFile + '?v=' + Date.now();
}

// 2 saniyede bir reload
setInterval(reloadSVG, 2000);
</script>

</body>
</html>
