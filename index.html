<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dinamik Animasyon Slider</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        #slider { position: relative; width: 100vw; height: 100vh; }
        
        /* Animasyon Efektleri */
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: all 1s ease-in-out; pointer-events: none; border: none; }
        .slide.active { opacity: 1; }
        .fade{opacity:0;}.fade.active{opacity:1;}
        .slide-left{transform:translateX(100%);opacity:0;}.slide-left.active{transform:translateX(0);opacity:1;transition:all 1s ease-in-out;}
        .zoom{transform:scale(0.5);opacity:0;}.zoom.active{transform:scale(1);opacity:1;transition:all 3s ease-in-out;}
        .slide-up { transform:translateY(100%); opacity:0; } .slide-up.active { transform:translateY(0); opacity:1; transition:all 1s ease-in-out; }
        .rotate-zoom { transform:rotate(-180deg) scale(0.5); opacity:0; } .rotate-zoom.active { transform:rotate(0deg) scale(1); opacity:1; transition:all 1.5s ease-in-out; }
        .circle{clip-path: circle(0% at 50% 50%);opacity:0;}.circle.active{clip-path: circle(100% at 50% 50%);opacity:1;transition: all 4s ease;}
        .wave{transform: translateY(100%) rotate(10deg);opacity:0;}.wave.active{transform: translateY(0) rotate(0);opacity:1;transition: all 2s ease;}
        .curtain{clip-path: inset(0 50% 0 50%);opacity:0;}.curtain.active{clip-path: inset(0 0 0 0);opacity:1;transition: all 5s ease;}
        .spin-zoom{transform: scale(0.2) rotate(-360deg);opacity:0;}.spin-zoom.active{transform: scale(1) rotate(0);opacity:1;transition: all 1.9s ease;}
        .rotate3d {transform: rotate3d(1,1,0,90deg);opacity:0;}.rotate3d.active{transform: rotate3d(0,0,0,0deg);opacity:1;transition: all 1.9s ease;}
        .cube{transform:rotateY(180deg) scale(.5);opacity:0;}.cube.active{transform:rotateY(0) scale(1);opacity:1;transition:3s;}

        /* Buton Stili */
        #fullscreen-btn { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 12px 20px; background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 8px; cursor: pointer; backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s ease; text-transform: uppercase; font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        body:hover #fullscreen-btn { opacity: 1; }
        :fullscreen #fullscreen-btn, :-webkit-full-screen #fullscreen-btn, :-ms-fullscreen #fullscreen-btn { display: none !important; }
    </style>
</head>
<body>

<button id="fullscreen-btn">Tam Ekran Yap</button>
<div id="slider"></div>

<script>
    const slider = document.getElementById("slider");
    const fsBtn = document.getElementById("fullscreen-btn");
    let slides = [];
    let timer;

    fsBtn.addEventListener("click", () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => console.error(err));
        }
    });

    async function initSlider() {
        try {
            const resp = await fetch('settings.json?t=' + Date.now());
            const config = await resp.json();

            slider.innerHTML = ""; 
            slides = [];

            config.forEach((s) => {
                const obj = document.createElement("object");
                obj.data = s.file;
                obj.type = "image/svg+xml";
                obj.className = `slide ${s.effect}`;
                obj.dataset.duration = s.duration;
                obj.dataset.effect = s.effect;
                obj.dataset.filename = s.file;

                // SVG yüklendiğinde çalışacak kod
                obj.addEventListener('load', function() {
                    try {
                        const svgDoc = obj.contentDocument;
                        if (svgDoc) {
                            // Dosya ismine bakmaksızın, "degisen-resim" id'sini arar
                            const imgElement = svgDoc.getElementById("degisen-resim");

                            if (imgElement) {
                                const subImages = ["resim1.jpg", "resim2.jpg", "resim3.jpg"]; 
                                let currentIndex = 0;

                                if(obj.imageTimer) clearInterval(obj.imageTimer);

                                obj.imageTimer = setInterval(() => {
                                    currentIndex = (currentIndex + 1) % subImages.length;
                                    let yeniResim = subImages[currentIndex];
                                    
                                    imgElement.setAttribute("href", yeniResim);
                                    imgElement.setAttributeNS("http://www.w3.org/1999/xlink", "href", yeniResim);
                                }, 2000); 
                            }
                        }
                    } catch(e) {
                        console.warn("SVG CORS Uyarısı:", e);
                    }
                });

                slider.appendChild(obj);
                slides.push(obj);
            });

            showSlide(0);
        } catch (err) {
            console.error("Başlatma hatası:", err);
            setTimeout(initSlider, 5000);
        }
    }

    async function showSlide(index) {
        if (slides.length === 0) return;

        slides.forEach(s => s.classList.remove("active"));
        const currentSlide = slides[index];
        currentSlide.classList.add("active");

        const duration = parseInt(currentSlide.dataset.duration);
        
        clearTimeout(timer);
        timer = setTimeout(async () => {
            await updateCheck();
            let next = (index + 1) >= slides.length ? 0 : index + 1;
            showSlide(next);
        }, duration);
    }

    async function updateCheck() {
        try {
            const resp = await fetch('settings.json?t=' + Date.now());
            const newConfig = await resp.json();

            newConfig.forEach((item, i) => {
                if (slides[i]) {
                    slides[i].dataset.duration = item.duration;
                    if (slides[i].dataset.effect !== item.effect) {
                        slides[i].classList.remove(slides[i].dataset.effect);
                        slides[i].classList.add(item.effect);
                        slides[i].dataset.effect = item.effect;
                    }
                    if (!slides[i].classList.contains("active")) {
                        slides[i].data = item.file + "?v=" + Date.now();
                    }
                }
            });
        } catch (e) {
            console.log("Güncelleme kontrolü başarısız.");
        }
    }

    initSlider();
</script>

</body>
</html>
