<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>SVG Canlı Önizleme</title>
  <style>
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0; 
      background: #f0f0f0;
    }
    #svg-container {
      width: 100%;
      height: 100%;
      border: 1px solid #ccc;
    }
    svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="svg-container">SVG Yükleniyor...</div>

  <script>
    const svgFile = 'slayt.svg'; // Aynı klasördeki SVG dosya adı

    async function loadSVG() {
      try {
        // cacheBuster ile tarayıcı önbelleğini atla
        const response = await fetch(`${svgFile}?cb=${Date.now()}`);
        if (!response.ok) throw new Error('SVG yüklenemedi!');
        const svgText = await response.text();
        document.getElementById('svg-container').innerHTML = svgText;
      } catch (e) {
        document.getElementById('svg-container').textContent = 'SVG yüklenirken hata oluştu: ' + e;
      }
    }

    loadSVG(); // İlk yükleme

    // Her 1 saniyede bir SVG'yi kontrol edip güncelle
    setInterval(loadSVG, 1000);
  </script>
</body>
</html>
