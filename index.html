<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SVG Live Inline</title>
<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
}
#svg-container {
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}
svg {
  width:100%;
  height:100%;
  display:block;
}
</style>
</head>
<body>

<div id="svg-container">SVG Yükleniyor...</div>

<script>
const svgFile = 'slayt.svg'; // Aynı depodaki SVG

async function loadSVG() {
  try {
    // cacheBuster ekleyerek değişiklikleri al
    const response = await fetch(svgFile + '?v=' + Date.now());
    if (!response.ok) throw new Error('SVG yüklenemedi!');
    const svgText = await response.text();

    // SVG'yi DOM'a ekle
    const container = document.getElementById('svg-container');
    
    // Sadece container boşsa ekle (flicker olmaması için)
    if (!container.innerHTML) {
      container.innerHTML = svgText;
    } else {
      // Inline güncelleme: yeni SVG ile eskiyi değiştir
      const parser = new DOMParser();
      const newDoc = parser.parseFromString(svgText, "image/svg+xml");
      const newSVG = newDoc.querySelector('svg');

      const oldSVG = container.querySelector('svg');
      if (oldSVG) {
        oldSVG.replaceWith(newSVG);
      } else {
        container.appendChild(newSVG);
      }
    }

  } catch(e) {
    document.getElementById('svg-container').textContent = 'SVG yüklenirken hata: ' + e;
  }
}

// İlk yükleme
loadSVG();

// Her 2 saniyede bir güncelle
setInterval(loadSVG, 2000);
</script>

</body>
</html>
