<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slayt</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
}

.container{
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

img{
width:100vw;
height:100vh;
object-fit:contain;
}

</style>

<script>

function reloadSVG(){
document.getElementById("slayt").src="slayt.svg?t="+Date.now();
}

setInterval(reloadSVG,2000);

</script>

</head>

<body>

<div class="container">

<img id="slayt" src="slayt.svg">

</div>

</body>

</html>
