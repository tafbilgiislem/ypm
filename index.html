<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Animasyon Senkron Slider</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

#slider{
position:relative;
width:100vw;
height:100vh;
perspective:1200px;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:all 2s ease;
}

.slide.active{
opacity:1;
}

/* Efektler */

.zoom{
transform:scale(1.3);
}

.zoom.active{
transform:scale(1);
}

.cube{
transform:rotateY(90deg) scale(.8);
}

.cube.active{
transform:rotateY(0) scale(1);
}

</style>

</head>

<body>

<div id="slider">

<object id="frame1" class="slide active"></object>

<object id="frame2" class="slide"></object>

</div>

<script>

const slides=[

{file:"slayt.svg",effect:"zoom",duration:10000},

{file:"info.svg",effect:"cube",duration:6000}

];

let aktif=1;

let index=0;


// SVG yükle (arka planda)
function loadNext(){

let yeni = aktif===1 ? 2:1;

let aktifFrame=document.getElementById("frame"+aktif);

let yeniFrame=document.getElementById("frame"+yeni);

let slide=slides[index];


// Efekt class reset
yeniFrame.className="slide "+slide.effect;


// SVG yükle (cache bypass)
yeniFrame.data=slide.file+"?t="+Date.now();


yeniFrame.onload=function(){

aktifFrame.classList.remove("active");

yeniFrame.classList.add("active");

aktif=yeni;


// Sonraki index
index++;

if(index>=slides.length){

index=0;

}


// Sonraki geçiş
setTimeout(loadNext,slide.duration);

};

}


// Başlat
window.onload=function(){

document.getElementById("frame1").data=slides[0].file;

index=1;

setTimeout(loadNext,slides[0].duration);

};

</script>

</body>

</html>
