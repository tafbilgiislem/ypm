<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Canlı Güncellenen SVG Saat</title>
  <style>
    #saatContainer {
      width: 300px;  /* SVG genişliği */
      height: 300px; /* SVG yüksekliği */
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Canlı Güncellenen SVG Saat</h1>
  <div id="saatContainer"></div>

  <script>
    // GitHub Pages üzerinden yayınladığın SVG URL'si
    const svgUrl = "https://tafbilgiislem.github.io/ypm/saat.svg";
    const container = document.getElementById("saatContainer");

    async function loadSVG() {
      try {
        const response = await fetch(svgUrl, { cache: "no-cache" }); // cache'i önlemek için
        if (!response.ok) throw new Error("SVG yüklenemedi");
        const svgText = await response.text();
        container.innerHTML = svgText;
      } catch (err) {
        console.error("SVG yükleme hatası:", err);
      }
    }

    // İlk yükleme
    loadSVG();

    // 1 saniyede bir yenile
    setInterval(loadSVG, 1000);
  </script>
</body>
</html>
