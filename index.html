<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slayt</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
}

.container{
width:100vw;
height:100vh;
}

object{
width:100vw;
height:100vh;
border:none;
}

</style>

<script>

function reloadSVG(){

let svg = document.getElementById("slayt");

let newData = "slayt.svg?t="+Date.now();

svg.data = newData;

}

setInterval(reloadSVG,2000);

</script>

</head>

<body>

<div class="container">

<object id="slayt"
type="image/svg+xml"
data="slayt.svg">
</object>

</div>

</body>

</html>
