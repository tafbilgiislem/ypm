<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>SVG Fullscreen Önizleme</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Kaydırma çubuğu olmasın */
      background: black;
    }

    #svg-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    svg {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Taşma olmadan tüm SVG görünür */
      display: block;
    }
  </style>
</head>
<body>
  <div id="svg-container">SVG Yükleniyor...</div>

  <script>
    const svgFile = 'slayt.svg'; // Aynı klasördeki SVG dosyan
    async function loadSVG() {
      try {
        const response = await fetch(`${svgFile}?cb=${Date.now()}`);
        if (!response.ok) throw new Error('SVG yüklenemedi!');
        let svgText = await response.text();

        // Eğer SVG’nin viewBox’ı yoksa ekle (1920x1080)
        if (!/viewBox/i.test(svgText)) {
          svgText = svgText.replace(
            /<svg([^>]*)>/i,
            '<svg$1 viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">'
          );
        }

        document.getElementById('svg-container').innerHTML = svgText;
      } catch (e) {
        document.getElementById('svg-container').textContent = 'SVG yüklenirken hata oluştu: ' + e;
      }
    }

    loadSVG(); // İlk yükleme
    setInterval(loadSVG, 1000); // 1 saniyede bir güncelle
  </script>
</body>
</html>
