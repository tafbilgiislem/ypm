<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SVG Live Dashboard</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  #svg-container {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  text.dynamic {
    font-size: 60px;
    fill: white;
    text-anchor: middle;
    dominant-baseline: middle;
  }
</style>
</head>
<body>

<div id="svg-container">SVG Yükleniyor...</div>

<script>
const svgFile = 'slayt.svg'; // Aynı klasördeki SVG dosyan

// Dinamik değerleri ekleyeceğimiz bir liste
const dynamicElements = [
  { id: 'clock', x: 960, y: 200 },
  { id: 'value1', x: 960, y: 400 },
  { id: 'value2', x: 960, y: 600 },
];

async function loadSVG() {
  try {
    const response = await fetch(svgFile);
    if (!response.ok) throw new Error('SVG yüklenemedi!');
    const svgText = await response.text();
    document.getElementById('svg-container').innerHTML = svgText;

    const svg = document.querySelector('#svg-container svg');

    // Dinamik elementleri ekle
    dynamicElements.forEach(item => {
      if (!document.getElementById(item.id)) {
        const textEl = document.createElementNS("http://www.w3.org/2000/svg", "text");
        textEl.setAttribute("id", item.id);
        textEl.setAttribute("x", item.x);
        textEl.setAttribute("y", item.y);
        textEl.setAttribute("class", "dynamic");
        textEl.textContent = ''; // Başlangıç boş
        svg.appendChild(textEl);
      }
    });

  } catch (e) {
    document.getElementById('svg-container').textContent = 'SVG yüklenirken hata oluştu: ' + e;
  }
}

// Dinamik değerleri güncelle
function updateDashboard() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString();

  // Örnek dinamik değerler (rastgele sayı)
  document.getElementById('value1').textContent = 'Sıcaklık: ' + (20 + Math.floor(Math.random() * 10)) + '°C';
  document.getElementById('value2').textContent = 'Nem: ' + (40 + Math.floor(Math.random() * 20)) + '%';
}

// Başlangıç
loadSVG().then(() => {
  updateDashboard();
  setInterval(updateDashboard, 1000); // her saniye güncelle
});
</script>

</body>
</html>
