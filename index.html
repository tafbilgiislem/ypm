<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gerçek Zamanlı Flicker-Free SVG Slider</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center;}
#slider{position:relative;width:100vw;height:100vh;}
.slide{position:absolute;width:100%;height:100%;opacity:0;transition:all 1s ease-in-out;}
.slide.active{opacity:1;}
/* Zoom efekti için sürekli animasyon */
@keyframes zoomAnim {
  0%   { transform: scale(0.5); }
  50%  { transform: scale(1.05); }
  100% { transform: scale(0.5); }
}
.zoom.active { 
  animation: zoomAnim 10s infinite ease-in-out; 
}
/* Cube geçişi */
.cube{transform:rotateY(180deg) scale(0.5);opacity:0;}
.cube.active{transform:rotateY(0) scale(1);opacity:1;transition:1.5s;}
</style>
</head>
<body>
<div id="slider">
  <object id="frame1" class="slide active"></object>
  <object id="frame2" class="slide"></object>
</div>

<script>
const svgFiles = [
  {file:"slayt.svg", effect:"zoom", duration:10000},
  {file:"info.svg", effect:"cube", duration:5000},
];

let aktif = 1; // frame1 aktif
let index = 0;

const frame1 = document.getElementById("frame1");
const frame2 = document.getElementById("frame2");
const frames = [frame1, frame2];

// --- SVG yükleme (cache bypass) ---
function loadSVG(slide, frame){
  frame.className = "slide "+slide.effect;
  frame.data = slide.file + "?t=" + Date.now();
}

// --- Slayt geçişi (double-buffer + per-slide süre) ---
function showNextSlide(){
  let yeni = aktif===1 ? 2 : 1;
  let aktifFrame = frames[aktif-1];
  let yeniFrame = frames[yeni-1];
  let slide = svgFiles[index];

  loadSVG(slide, yeniFrame);

  yeniFrame.onload = function(){
    aktifFrame.classList.remove("active");
    yeniFrame.classList.add("active");
    aktif = yeni;
    index = (index+1) % svgFiles.length;
    setTimeout(showNextSlide, slide.duration);
  };
}

// --- Başlat ---
window.onload = function(){
  frame1.data = svgFiles[0].file + "?t=" + Date.now();
  index = 1;
  setTimeout(showNextSlide, svgFiles[0].duration);
};

// --- Gerçek zamanlı SVG güncelleme (flicker-free) ---
setInterval(()=>{
  let aktifFrame = frames[aktif-1];
  let yedekFrame = frames[aktif===1 ? 1 : 0]; // arka plan frame
  let currentSlide = svgFiles[index===0 ? svgFiles.length-1 : index-1];

  fetch(currentSlide.file, {cache:"no-store"}).then(resp=>{
    if(resp.ok){
      // Arka planda yükle
      loadSVG(currentSlide, yedekFrame);
      yedekFrame.onload = function(){
        aktifFrame.classList.remove("active");
        yedekFrame.classList.add("active");
        aktif = aktif===1 ? 2 : 1;
      };
    }
  });
}, 1000); // 1 saniyede bir kontrol
</script>
</body>
</html>
